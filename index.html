<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-100 font-sans h-screen flex overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-white shadow-md flex flex-col h-full z-10">
        <div class="p-6 border-b border-gray-200">
            <h1 class="text-2xl font-bold text-gray-800">Dev Tools</h1>
        </div>
        <nav class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-1">
                <li>
                    <button class="nav-btn w-full text-left px-6 py-3 hover:bg-gray-50 text-gray-700 font-medium active-nav" data-target="json-tool">
                        JSON Formatter
                    </button>
                </li>
                <li>
                    <button class="nav-btn w-full text-left px-6 py-3 hover:bg-gray-50 text-gray-700 font-medium" data-target="unicode-tool">
                        Unicode Converter
                    </button>
                </li>
                <li>
                    <button class="nav-btn w-full text-left px-6 py-3 hover:bg-gray-50 text-gray-700 font-medium" data-target="timestamp-tool">
                        Timestamp Tool
                    </button>
                </li>
                <li>
                    <button class="nav-btn w-full text-left px-6 py-3 hover:bg-gray-50 text-gray-700 font-medium" data-target="regex-tool">
                        Regex Tester
                    </button>
                </li>
                <li>
                    <button class="nav-btn w-full text-left px-6 py-3 hover:bg-gray-50 text-gray-700 font-medium" data-target="sql-tool">
                        SQL Formatter
                    </button>
                </li>
            </ul>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 h-full overflow-y-auto bg-gray-50 p-8">
        <!-- JSON Tool -->
        <section id="json-tool" class="tool-section block">
            <h2 class="text-2xl font-semibold mb-6 text-gray-800">JSON Formatter & Compressor</h2>
            <div class="grid grid-cols-2 gap-6 h-[calc(100vh-12rem)]">
                <div class="flex flex-col">
                    <label for="json-input" class="block text-sm font-medium text-gray-700 mb-2">Input JSON</label>
                    <textarea id="json-input" class="flex-1 p-4 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 font-mono text-sm resize-none"></textarea>
                    <div class="mt-4 flex flex-wrap gap-3">
                        <button id="btn-format-json" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 shadow-sm transition-colors">Format</button>
                        <button id="btn-compress-json" class="px-4 py-2 bg-gray-600 text-white rounded-md hover:bg-gray-700 shadow-sm transition-colors">Compress</button>
                        <button id="btn-escape-json" class="px-4 py-2 bg-purple-600 text-white rounded-md hover:bg-purple-700 shadow-sm transition-colors">Escape (转义)</button>
                        <button id="btn-unescape-json" class="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 shadow-sm transition-colors">Unescape (去转义)</button>
                        <div class="flex items-center ml-2 border-l border-gray-300 pl-4">
                            <input type="checkbox" id="json-preserve-unicode" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                            <label for="json-preserve-unicode" class="ml-2 block text-sm text-gray-700">Preserve Unicode (保持中文)</label>
                        </div>
                    </div>
                </div>
                <div class="flex flex-col relative">
                    <div class="flex justify-between items-center mb-2">
                        <label for="json-output" class="block text-sm font-medium text-gray-700">Output</label>
                        <button id="btn-copy-json" class="px-3 py-1 bg-gray-600 text-white rounded-md hover:bg-gray-700 shadow-sm transition-colors text-sm hidden">Copy</button>
                    </div>
                    <div class="flex-1 border border-gray-300 rounded-md shadow-sm bg-gray-50 overflow-auto relative">
                        <pre><code id="json-output" class="block p-4 font-mono text-sm w-full min-h-full bg-transparent whitespace-pre text-gray-800"></code></pre>
                    </div>
                </div>
            </div>
        </section>

        <!-- Unicode Tool -->
        <section id="unicode-tool" class="tool-section hidden">
            <h2 class="text-2xl font-semibold mb-6 text-gray-800">Unicode / ASCII Converter</h2>
            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 space-y-6">
                <div>
                    <label for="unicode-input" class="block text-sm font-medium text-gray-700 mb-2">Text to Convert</label>
                    <textarea id="unicode-input" rows="4" class="w-full p-4 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 font-mono text-sm"></textarea>
                </div>
                <div class="flex flex-wrap gap-3">
                    <button id="btn-to-unicode" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 shadow-sm transition-colors">Text to Unicode (\uXXXX)</button>
                    <button id="btn-to-text" class="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 shadow-sm transition-colors">Unicode to Text</button>
                    <button id="btn-to-ascii" class="px-4 py-2 bg-purple-600 text-white rounded-md hover:bg-purple-700 shadow-sm transition-colors">Text to ASCII Codes</button>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label for="unicode-output" class="block text-sm font-medium text-gray-700">Result</label>
                        <button id="btn-copy-unicode" class="px-3 py-1 bg-gray-600 text-white rounded-md hover:bg-gray-700 shadow-sm transition-colors text-sm hidden">Copy</button>
                    </div>
                    <div class="w-full h-32 border border-gray-300 rounded-md shadow-sm bg-gray-50 overflow-auto relative">
                        <pre><code id="unicode-output" class="block p-4 font-mono text-sm w-full min-h-full bg-transparent whitespace-pre-wrap break-all text-gray-800"></code></pre>
                    </div>
                </div>
            </div>
        </section>

        <!-- Timestamp Tool -->
        <section id="timestamp-tool" class="tool-section hidden">
            <h2 class="text-2xl font-semibold mb-6 text-gray-800">Timestamp Converter</h2>
            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 space-y-8">

                <!-- Current Time -->
                <div class="flex items-center space-x-4 bg-blue-50 p-4 rounded-md">
                    <span class="font-medium text-blue-900">Current Unix Timestamp (s):</span>
                    <span id="current-timestamp" class="text-lg font-mono text-blue-700 font-bold"></span>
                    <button id="btn-refresh-time" class="text-blue-600 hover:text-blue-800 underline text-sm">Refresh</button>
                    <div class="ml-auto flex items-center space-x-2">
                        <label for="timezone-select" class="text-sm font-medium text-blue-900">Timezone:</label>
                        <select id="timezone-select" class="p-1 border border-gray-300 rounded bg-white text-sm focus:ring-blue-500 focus:border-blue-500 max-w-[200px]">
                            <option value="local">Local Time</option>
                            <option value="UTC">UTC (GMT)</option>
                            <option value="Asia/Shanghai">Asia/Shanghai (CST)</option>
                            <option value="America/New_York">America/New_York (EST/EDT)</option>
                            <option value="America/Los_Angeles">America/Los_Angeles (PST/PDT)</option>
                            <option value="Europe/London">Europe/London (GMT/BST)</option>
                            <option value="Europe/Paris">Europe/Paris (CET/CEST)</option>
                            <option value="Asia/Tokyo">Asia/Tokyo (JST)</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Timestamp to Date -->
                    <div class="space-y-4">
                        <h3 class="text-lg font-medium text-gray-800 border-b pb-2">Timestamp to Date</h3>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">Timestamp</label>
                            <input type="text" id="ts-input" class="w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 font-mono" placeholder="e.g. 1672531200">
                        </div>
                        <div class="flex items-center space-x-2">
                            <select id="ts-unit" class="p-2 border border-gray-300 rounded-md bg-white text-sm">
                                <option value="s">Seconds (s)</option>
                                <option value="ms">Milliseconds (ms)</option>
                            </select>
                            <button id="btn-ts-to-date" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 shadow-sm transition-colors">Convert</button>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">Result Date <span id="ts-date-timezone-label" class="text-xs text-gray-400 font-normal ml-1"></span></label>
                            <input type="text" id="ts-date-result" class="w-full p-2 border border-gray-300 rounded-md bg-gray-50 font-mono" readonly>
                        </div>
                    </div>

                    <!-- Date to Timestamp -->
                    <div class="space-y-4">
                        <h3 class="text-lg font-medium text-gray-800 border-b pb-2">Date to Timestamp</h3>
                        <div>
                            <label class="block text-sm text-gray-600 mb-1">Date String (YYYY-MM-DD HH:mm:ss)</label>
                            <input type="text" id="date-input" class="w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 font-mono" placeholder="e.g. 2023-01-01 00:00:00">
                        </div>
                        <div class="flex space-x-2">
                            <button id="btn-date-to-ts" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 shadow-sm transition-colors">Convert</button>
                            <button id="btn-set-now" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 shadow-sm transition-colors text-sm">Now</button>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Timestamp (s)</label>
                                <input type="text" id="date-ts-s-result" class="w-full p-2 border border-gray-300 rounded-md bg-gray-50 font-mono text-sm" readonly>
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Timestamp (ms)</label>
                                <input type="text" id="date-ts-ms-result" class="w-full p-2 border border-gray-300 rounded-md bg-gray-50 font-mono text-sm" readonly>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Regex Tool -->
        <section id="regex-tool" class="tool-section hidden">
            <h2 class="text-2xl font-semibold mb-6 text-gray-800">Regex Tester</h2>
            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Regular Expression</label>
                    <div class="flex items-center space-x-2">
                        <span class="text-gray-500 text-xl font-mono">/</span>
                        <input type="text" id="regex-pattern" class="flex-1 p-3 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 font-mono text-lg" placeholder="pattern">
                        <span class="text-gray-500 text-xl font-mono">/</span>
                        <input type="text" id="regex-flags" class="w-20 p-3 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 font-mono text-lg" placeholder="gmi" value="g">
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div>
                        <label for="regex-test-string" class="block text-sm font-medium text-gray-700 mb-2">Test String</label>
                        <textarea id="regex-test-string" rows="8" class="w-full p-4 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 font-mono text-sm"></textarea>
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-sm font-medium text-gray-700">Match Results</label>
                            <span id="regex-match-count" class="text-xs font-semibold bg-gray-200 text-gray-700 px-2 py-1 rounded-full">0 matches</span>
                        </div>
                        <div id="regex-result-display" class="w-full h-48 lg:h-auto lg:min-h-[16rem] p-4 border border-gray-300 rounded-md shadow-sm bg-gray-50 font-mono text-sm overflow-auto whitespace-pre-wrap"></div>
                    </div>
                </div>
            </div>
        </section>

        

        <!-- SQL Tool -->
        <section id="sql-tool" class="tool-section hidden">
            <h2 class="text-2xl font-semibold mb-6 text-gray-800">SQL Formatter</h2>
            <div class="grid grid-cols-2 gap-6 h-[calc(100vh-12rem)]">
                <div class="flex flex-col">
                    <label for="sql-input" class="block text-sm font-medium text-gray-700 mb-2">Input SQL</label>
                    <textarea id="sql-input" class="flex-1 p-4 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 font-mono text-sm resize-none"></textarea>
                    <div class="mt-4 flex flex-wrap gap-3 items-center">
                        <select id="sql-dialect" class="p-2 border border-gray-300 rounded-md bg-white text-sm shadow-sm focus:ring-blue-500 focus:border-blue-500">
                            <option value="sql">Standard SQL</option>
                            <option value="mysql">MySQL</option>
                            <option value="postgresql">PostgreSQL</option>
                            <option value="tsql">T-SQL (SQL Server)</option>
                            <option value="mariadb">MariaDB</option>
                            <option value="sqlite">SQLite</option>
                        </select>
                        <button id="btn-format-sql" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 shadow-sm transition-colors">Format SQL</button>
                    </div>
                </div>
                <div class="flex flex-col relative">
                    <div class="flex justify-between items-center mb-2">
                        <label for="sql-output" class="block text-sm font-medium text-gray-700">Output</label>
                        <button id="btn-copy-sql" class="px-3 py-1 bg-gray-600 text-white rounded-md hover:bg-gray-700 shadow-sm transition-colors text-sm hidden">Copy</button>
                    </div>
                    <div class="flex-1 border border-gray-300 rounded-md shadow-sm bg-gray-50 overflow-auto relative">
                        <pre><code id="sql-output" class="language-sql block p-4 font-mono text-sm w-full min-h-full bg-transparent whitespace-pre"></code></pre>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sql-formatter@15.0.2/dist/sql-formatter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js"></script>
    <script src="app.js"></script>
    <script src="tools/json.js"></script>
    <script src="tools/unicode.js"></script>
    <script src="tools/timestamp.js"></script>
    <script src="tools/regex.js"></script>
    <script src="tools/sql.js"></script>
</body>
</html>
